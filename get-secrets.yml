- name: Get Secrets
  hosts: localhost
  tasks:
    - name: create file and add line
      ansible.builtin.lineinfile:
        path: /tmp
        line: "Username: {{lookup('hashi_vault', 'secret=common/data/ssh token={{vault_token}} url=https://vault.mohdshuja.com.online:8200 validate_certs=False')}}"
        create: yes
